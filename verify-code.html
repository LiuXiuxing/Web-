
<!DOCTYPE html>
<html>
    <head>
        <title>Verify Code</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/css/style.css">
    </head>
    <body>
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-100">
                <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                    
                    <!-- Verify Code Card -->
                    <div class="card shadow-lg rounded-4">
                        <div class="card-body p-4 p-sm-5">
                            
                            <!-- Logo -->
                            <div class="text-center mb-4">
                                <div class="logo-container d-inline-block" style="width: 140px; height: 140px;">
                                    <img src="assets/images/logosample101.webp" alt="Logo" class="img-fluid">
                                </div>
                            </div>
                            
                            <!-- Form Title -->
                            <h3 class="text-center mb-3 fw-semibold">Verify Code</h3>
                            <p class="text-center text-muted-custom mb-4">
                                We've sent a verification code to your email. Please enter it below.
                            </p>
                            
                            <!-- Verify Code Form -->
                            <form action="reset-password.html">
                                <!-- Verification Code -->
                                <div class="mb-4">
                                    <label for="code" class="form-label fw-medium">Verification Code</label>
                                    <input type="text" class="form-control form-control-lg text-center" id="code" placeholder="Enter 6-digit code" minlength="6" maxlength="6" pattern="\d{6}" required>
                                </div>
                                
                                <!-- Verify Code Button -->
                                <div class="d-grid gap-2 mb-3">
                                    <button type="submit" class="btn btn-primary btn-lg fw-semibold">
                                        Verify Code
                                    </button>
                                </div>
                            </form>
                            
                            <p class="text-center text-muted-custom mb-2">
                                Didn't receive the code? <a href="#" class="resend-link">Resend Code</a>
                            </p>
                            
                            <p class="text-center mb-0">
                                <a href="index.html" class="back-link">← Back to Login</a>
                            </p>
                            
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
    </body>
</html>
