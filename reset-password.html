<!DOCTYPE html>
<html>
    <head>
        <title>Reset Password</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/css/style.css" title="" type="" />
    </head>
    <body>
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-100">
                <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                    
                    <!-- Reset Password Card -->
                    <div class="card shadow-lg rounded-4">
                        <div class="card-body p-4 p-sm-5">
                            
                            <!-- Logo -->
                            <div class="text-center mb-4">
                                <div class="logo-container d-inline-block" style="width: 140px; height: 140px;">
                                    <img src="assets/images/logosample101.webp" alt="Logo" class="img-fluid">
                                </div>
                            </div>
                            
                            <!-- Form Title -->
                            <h3 class="text-center mb-3 fw-semibold">Reset Password</h3>
                            <p class="text-center text-muted-custom mb-4">
                                Create a new password for your account.
                            </p>
                            
                            <!-- Reset Password Form -->
                            <form action="index.html">
                                <!-- New Password -->
                                <div class="mb-3">
                                    <label for="newPassword" class="form-label fw-medium">New Password</label>
                                    <input type="password" class="form-control form-control-lg" id="newPassword" placeholder="Enter new password" minlength="8" required>
                                    <div class="password-requirements">
                                        Password must be at least 8 characters long
                                    </div>
                                </div>
                                
                                <!-- Confirm Password -->
                                <div class="mb-4">
                                    <label for="confirmPassword" class="form-label fw-medium">Confirm Password</label>
                                    <input type="password" class="form-control form-control-lg" id="confirmPassword" placeholder="Confirm new password" minlength="8" required>
                                </div>
                                
                                <!-- Reset Password Button -->
                                <div class="d-grid gap-2 mb-3">
                                    <button type="submit" class="btn btn-primary btn-lg fw-semibold">
                                        Reset Password
                                    </button>
                                </div>
                            </form>
                            
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
    </body>
</html>
