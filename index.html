<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>
        Log-In
        </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/css/style.css" title="" type="" />
    </head>
    <body>
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-100">
                <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                    
                    <!-- Login Card -->
                    <div class="card shadow-lg rounded-4">
                        <div class="card-body p-4 p-sm-5">
                            
                            <!-- Logo -->
                            <div class="text-center mb-4">
                                <div class="logo-container d-inline-block" style="width: 140px; height: 140px;">
                                    <img src="assets/images/logosample101.webp" alt="Logo" class="img-fluid">
                                </div>
                            </div>
                            
                            <!-- Form Title -->
                            <h3 class="text-center mb-4 fw-semibold">Welcome Back</h3>
                            
                            <!-- Login Form -->
                            <form action="/admin/dashboard.html">
                                
                                <!-- Email -->
                                <div class="mb-3">
                                    <label for="Email" class="form-label fw-medium">Email</label>
                                    <input type="email" class="form-control form-control-lg" id="email" placeholder="name@gmail.com" required>
                                </div>
                                <!--Password-->
                                <div class="mb-3">
                                    <label for="password" class="form-label fw-medium">Password</label>
                                    <input type="password" class="form-control form-control-lg" id="number" placeholder="Enter your password" required>
                                </div>
                                <!-- Remember Me and Forgot Password -->
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="rememberMe">
                                        <label class="form-check-label" for="rememberMe">
                                            Remember me
                                        </label>
                                    </div>
                                    <a style="text-decoration: none;" href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                                </div>  
                                <!-- Submit Button -->
                                <div class="d-grid gap-2 mb-3">
                                    <button type="submit" class="btn btn-primary btn-lg fw-semibold">
                                        Log In
                                    </button>
                                </div>
                            </form> 
                                 <p style="text-align: center;">Don't have an account? <a style="text-decoration: none;" href="signup.html">Click here</a></p>
                                </html>
