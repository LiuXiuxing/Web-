<!-- navbar.html -->
<!-- Mobile Top Navbar (visible on small screens) -->
<nav class="mobile-navbar navbar d-lg-none px-3">
    <button class="navbar-toggler-custom" id="mobileSidebarToggle">
        <i class="bi bi-list"></i>
    </button>
    <span class="fw-bold text-white fs-6">MyDashboard</span>
    <div class="d-flex align-items-center gap-2">
        <button class="icon-btn position-relative">
            <i class="bi bi-bell-fill text-white"></i>
            <span class="notif-dot"></span>
        </button>
        <div class="user-avatar-sm">JD</div>
    </div>
</nav>

<style>
.mobile-navbar {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    position: sticky;
    top: 0;
    z-index: 999;
    height: 58px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.navbar-toggler-custom {
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 8px;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1.3rem;
    cursor: pointer;
    transition: background 0.2s;
}

.navbar-toggler-custom:hover {
    background: rgba(255,255,255,0.25);
}

.icon-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 8px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
}

.icon-btn:hover {
    background: rgba(255,255,255,0.25);
}

.notif-dot {
    width: 8px;
    height: 8px;
    background: #fc8181;
    border-radius: 50%;
    position: absolute;
    top: 5px;
    right: 5px;
    border: 1.5px solid #764ba2;
}

.user-avatar-sm {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 700;
    border: 2px solid rgba(255,255,255,0.4);
    cursor: pointer;
}

/* Mobile sidebar overlay */
.sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 999;
}

.sidebar-overlay.active {
    display: block;
}

@media (max-width: 991.98px) {
    #sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        z-index: 1050;
    }
    #sidebar.open {
        transform: translateX(0);
    }
}
</style>

<script>
(function () {
    const toggleBtn = document.getElementById('mobileSidebarToggle');
    const sidebar = document.getElementById('sidebar');

    // Create overlay
    let overlay = document.querySelector('.sidebar-overlay');
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.className = 'sidebar-overlay';
        document.body.appendChild(overlay);
    }

    if (toggleBtn && sidebar) {
        toggleBtn.addEventListener('click', function () {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        });

        overlay.addEventListener('click', function () {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        });
    }
})();
</script>
