<!DOCTYPE html>
<html>
    <head>
        <title>
        Log-In
        </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/css/style.css">
        <style>
          
        </style>
    </head>
    <body>
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-100">
                <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                    
                    <!-- Login Card -->
                    <div class="card shadow-lg rounded-4">
                        <div class="card-body p-4 p-sm-5">
                            
                            <!-- Logo -->
                            <div class="text-center mb-4">
                                <div class="logo-container d-inline-block" style="width: 140px; height: 140px;">
                                    <img src="assets/images/logosample101.webp" alt="Logo" class="img-fluid">
                                </div>
                            </div>
                            
                            <!-- Form Title -->
                            <h3 class="text-center mb-4 fw-semibold">Sign Up</h3>
                            
                            <!-- Login Form -->
                            <form action="/index.html">
                                
                                <!-- Full Name -->
                                <div class="mb-3">
                                    <label for="text" class="form-label fw-medium">Full Name</label>
                                    <input type="text" class="form-control form-control-lg" id="text" placeholder="Enter your name" required>
                                </div>

                                <!-- Employee/Student ID -->
                                <div class="mb-3">
                                    <label for="text" class="form-label fw-medium">Employee/Student ID</label>
                                    <input type="number" class="form-control form-control-lg" id="" placeholder="Enter your ID" required>
                                </div>
                                <!--Password-->
                                <div class="mb-3">
                                    <label for="password" class="form-label fw-medium">Password</label>
                                    <input type="password" class="form-control form-control-lg" id="number" minlength="8" placeholder="Enter your password" required>
                                </div>
                                <!--Confirm Password-->
                                <div class="mb-3">
                                    <label for="password" class="form-label fw-medium">Confirm Password</label>
                                    <input type="password" class="form-control form-control-lg" id="number" minlength="8" placeholder="Confirm your password" required>
                                </div>  
                                <!-- Remember Me Checkbox -->
                                <div class="form-check mb-4">
                                    <input class="form-check-input" type="checkbox" id="rememberMe">
                                    <label class="form-check-label" for="rememberMe">
                                        Remember me
                                    </label>
                                </div>
                                
                                <!-- Submit Button -->
                                <div class="d-grid gap-2 mb-3">
                                    <button type="submit" class="btn btn-primary btn-lg fw-semibold">
                                        Sign Up
                                    </button>
                            </form>
                                    <p>Already have an account? <a style="text-decoration: none;" href="index.html">Click here</a></p>
                                </html>
